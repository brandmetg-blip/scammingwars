<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💸 SCAM WARS: 2v2 SUMMER EDITION 💸</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bungee:wght@400&family=Archivo+Black&family=Space+Mono:wght@400;700&display=swap');

* { margin:0; padding:0; box-sizing:border-box; }

:root{
  --teamA:#ff2e63;
  --teamB:#ffd93d;
  --bg:#0a0a14;
}

body{
  font-family:'Space Mono',monospace;
  background:var(--bg);
  color:#fff;
  min-height:100vh;
  overflow-x:hidden;
  position:relative;
}

body::before{
  content:"";
  position:fixed; inset:0;
  background:
    radial-gradient(circle at 18% 30%, rgba(255,46,99,.16), transparent 42%),
    radial-gradient(circle at 82% 30%, rgba(255,217,61,.14), transparent 42%),
    radial-gradient(circle at 50% 85%, rgba(0,245,212,.10), transparent 45%);
  z-index:-2;
  animation:bgmove 12s ease-in-out infinite alternate;
}
@keyframes bgmove{ to{ transform:scale(1.3) rotate(5deg); } }

.rain{ position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden; }
.rain span{ position:absolute; top:-50px; font-size:28px; animation:fall linear infinite; opacity:.5; }
@keyframes fall{ to{ transform:translateY(110vh) rotate(360deg); } }

.wrap{ max-width:900px; margin:0 auto; padding:24px 16px 80px; position:relative; z-index:1; }

header{ text-align:center; margin-bottom:18px; }
h1{
  font-family:'Bungee',cursive;
  font-size:clamp(26px,7.5vw,58px);
  line-height:.95;
  background:linear-gradient(90deg,var(--teamA),#fff,var(--teamB),var(--teamA));
  background-size:300% 100%;
  -webkit-background-clip:text; background-clip:text;
  -webkit-text-fill-color:transparent;
  animation:shine 4s linear infinite;
  filter:drop-shadow(3px 3px 0 #000);
}
@keyframes shine{ to{ background-position:300% 0; } }
.sub{ font-size:13px; letter-spacing:3px; margin-top:8px; opacity:.7; text-transform:uppercase; }
.sub b{ color:var(--teamB); }

/* sync status pill */
.sync{ display:inline-block; margin-top:10px; font-size:11px; letter-spacing:1px; padding:5px 14px; border-radius:99px; border:1px solid #444; opacity:.85; }
.sync.ok{ border-color:#00f5d4; color:#00f5d4; }
.sync.err{ border-color:var(--teamA); color:var(--teamA); }
.sync.saving{ border-color:var(--teamB); color:var(--teamB); }

.musicbtn{
  display:inline-flex; align-items:center; gap:8px; margin:14px auto 0; cursor:pointer;
  padding:10px 20px; border-radius:99px; border:2px solid var(--teamB); background:#000;
  color:var(--teamB); font-family:'Space Mono'; font-weight:700; letter-spacing:1px;
  font-size:13px; transition:.2s; text-transform:uppercase;
}
.musicbtn:hover{ box-shadow:0 0 18px var(--teamB); transform:scale(1.05); }
.musicbtn.on{ border-color:#00f5d4; color:#00f5d4; }
.musicbtn.on:hover{ box-shadow:0 0 18px #00f5d4; }

.arena{ display:grid; grid-template-columns:1fr auto 1fr; align-items:center; gap:12px; margin:34px 0 10px; }
.fighter{
  text-align:center; padding:20px 12px; border-radius:18px; border:3px solid;
  position:relative; transition:.5s cubic-bezier(.2,1.4,.5,1); background:rgba(255,255,255,.03);
}
.fighter.A{ border-color:var(--teamA); color:var(--teamA); }
.fighter.B{ border-color:var(--teamB); color:var(--teamB); }
.fighter.lead{ box-shadow:0 0 50px -8px currentColor, inset 0 0 34px rgba(255,255,255,.08); transform:scale(1.04); }
.fighter.justwon{ animation:pop .6s cubic-bezier(.2,1.6,.4,1); }
@keyframes pop{ 0%{transform:scale(1.04);} 40%{transform:scale(1.15) rotate(-2deg);} 100%{transform:scale(1.04);} }
.fighter .crown{ font-size:30px; height:34px; }
.fighter .fname{ font-family:'Archivo Black'; font-size:18px; color:#fff; text-transform:uppercase; margin-top:4px; word-break:break-word; }
.fighter .fcash{ font-family:'Bungee'; font-size:30px; margin-top:8px; text-shadow:0 0 16px currentColor; }
.fighter .ftag{ font-size:11px; font-weight:700; margin-top:8px; min-height:14px; color:#fff; opacity:.85; }
.vs{ font-family:'Bungee'; font-size:clamp(26px,7vw,46px); color:#fff; text-shadow:0 0 20px var(--teamA),0 0 30px var(--teamB); animation:vspulse 1.4s ease-in-out infinite; }
@keyframes vspulse{ 50%{ transform:scale(1.12); } }

.tug{ height:18px; border-radius:99px; overflow:hidden; display:flex; border:2px solid #000; margin:6px 0 30px; box-shadow:0 0 0 1px rgba(255,255,255,.1); }
.tug .a{ background:var(--teamA); transition:width .7s cubic-bezier(.3,1.4,.5,1); }
.tug .b{ background:var(--teamB); transition:width .7s cubic-bezier(.3,1.4,.5,1); }

.team-block{ margin-bottom:16px; }
.team-block > .label{ font-family:'Archivo Black'; font-size:13px; letter-spacing:2px; text-transform:uppercase; margin-bottom:8px; opacity:.8; }
.team-block.A > .label{ color:var(--teamA); }
.team-block.B > .label{ color:var(--teamB); }

.card{
  border:3px solid; border-radius:16px; padding:16px; margin-bottom:12px;
  background:rgba(255,255,255,.03); backdrop-filter:blur(4px);
  position:relative; overflow:hidden;
}
.card::after{ content:""; position:absolute; right:-30px; top:-30px; width:120px; height:120px; border-radius:50%; background:currentColor; opacity:.12; filter:blur(20px); }
.card.A{ border-color:var(--teamA); color:var(--teamA); }
.card.B{ border-color:var(--teamB); color:var(--teamB); }
.chead{ display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
.chead .nm{ font-family:'Archivo Black'; font-size:18px; text-transform:uppercase; }
.total{ font-family:'Bungee'; font-size:22px; color:#fff; text-shadow:0 0 14px currentColor; }
.months{ display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
.month label{ display:block; font-size:10px; text-transform:uppercase; letter-spacing:1px; margin-bottom:3px; opacity:.8; }
.month input{
  width:100%; padding:8px; border-radius:8px; border:2px solid currentColor;
  background:#000; color:#fff; font-family:'Space Mono'; font-weight:700; font-size:14px; text-align:center;
}
.month input:focus{ outline:none; box-shadow:0 0 12px currentColor; }

footer{ text-align:center; margin-top:24px; font-size:11px; opacity:.5; }
</style>
</head>
<body>
<div class="rain" id="rain"></div>
<div class="wrap">
  <header>
    <h1>SCAM WARS · 2v2</h1>
    <div class="sub">summer showdown · <b>jun → jul → aug</b> · last team standing eats 🤑</div>
    <div><span class="sync" id="sync">connecting…</span></div>
    <button class="musicbtn" id="musicbtn" onclick="toggleMusic()">🔇 tap to start the vibe</button>
  </header>

  <div class="arena" id="arena"></div>
  <div class="tug"><div class="a" id="tug-a"></div><div class="b" id="tug-b"></div></div>

  <div id="teams"></div>

  <footer>shared live scoreboard · everyone sees the same numbers · auto-syncs every few seconds 📈</footer>
</div>

<audio id="bgMusic" src="bgmusic.mp3" loop preload="auto"></audio>
<audio id="firstSound" src="first.mp3" preload="auto"></audio>

<script>
/* ============================================================
   JSONBIN SHARED STORAGE  — FILL THESE TWO IN  (see chat instructions)
   ============================================================ */
const JSONBIN_BIN_ID  = "6a18597521f9ee59d295b48b";
const JSONBIN_API_KEY = "$2a$10$wUL5vHPci5ylelUPqniAi.03JVw.StV/nmHsQvIlSaWTCvi6L161e";
/* ============================================================ */

const BIN_URL = "https://api.jsonbin.io/v3/b/" + JSONBIN_BIN_ID;
const HEADERS = { "Content-Type":"application/json", "X-Master-Key": JSONBIN_API_KEY };

const TEAMS = {
  A: { side:'A', name:'Lazic / Velja',  emoji:'🐺🐉', members:[
        { id:'lazic', name:'Lazic', emoji:'🐺' },
        { id:'velja', name:'Velja', emoji:'🐉' },
      ]},
  B: { side:'B', name:'Dusan / David', emoji:'👑', members:[
        { id:'dusan', name:'Dusan', emoji:'👑' },
        { id:'david', name:'David', emoji:'🤴' },
      ]},
};
const MONTHS = ['June','July','August'];
const LEAD_HYPE = ['👑 ON TOP. UNTOUCHABLE','💎 GOATED fr','🚀 sigma grindset','🔥 cooking the opps'];
const LOSE_HYPE = ['💀 it\'s so over','🤡 down bad','🪦 L + ratio','😭 lock in gng'];
const TIE_HYPE  = ['😳 dead even...','🤝 nobody eating yet'];

const RE = ['💸','🤑','💵','📈','🪙','💰','🔥','💎'];
const rain = document.getElementById('rain');
for(let i=0;i<22;i++){
  const s=document.createElement('span');
  s.textContent=RE[i%RE.length];
  s.style.left=Math.random()*100+'%';
  s.style.animationDuration=(6+Math.random()*8)+'s';
  s.style.animationDelay=(-Math.random()*10)+'s';
  s.style.fontSize=(18+Math.random()*26)+'px';
  rain.appendChild(s);
}

let data = {};
Object.values(TEAMS).forEach(t=> t.members.forEach(m=> data[m.id]=[0,0,0]));
let currentLeader = null;
let activeInput = null;   // don't overwrite a field the user is typing in
let saveTimer = null;

function setSync(state, msg){
  const el=document.getElementById('sync');
  el.className='sync '+(state||'');
  el.textContent=msg;
}

/* ---------- shared cloud storage ---------- */
async function cloudLoad(){
  if(JSONBIN_BIN_ID.startsWith("PASTE")){ setSync('err','⚠ not configured — see setup'); return; }
  try{
    const r = await fetch(BIN_URL+"/latest", { headers: HEADERS });
    if(!r.ok) throw new Error(r.status);
    const j = await r.json();
    const rec = j.record || {};
    Object.keys(data).forEach(id=>{ if(Array.isArray(rec[id])) data[id]=rec[id]; });
    setSync('ok','🟢 live & synced');
    refreshInputs(); render();
  }catch(e){ setSync('err','🔴 sync error (retrying)'); }
}

async function cloudSave(){
  if(JSONBIN_BIN_ID.startsWith("PASTE")){ return; }
  setSync('saving','💾 saving…');
  try{
    const r = await fetch(BIN_URL, { method:"PUT", headers:HEADERS, body:JSON.stringify(data) });
    if(!r.ok) throw new Error(r.status);
    setSync('ok','🟢 live & synced');
  }catch(e){ setSync('err','🔴 save failed'); }
}

function queueSave(){
  clearTimeout(saveTimer);
  saveTimer = setTimeout(cloudSave, 700); // debounce typing
}

const fmt = n => '$'+ (n||0).toLocaleString('en-US');
const memberTotal = id => data[id].reduce((a,b)=>a+(+b||0),0);
const teamTotal = side => TEAMS[side].members.reduce((s,m)=>s+memberTotal(m.id),0);

/* ---------- local mp3 background music ---------- */
let musicOn=false;
function toggleMusic(){
  const btn=document.getElementById('musicbtn');
  const audio=document.getElementById('bgMusic');
  if(musicOn){
    audio.pause();
    musicOn=false;
    btn.classList.remove('on');
    btn.textContent='🔇 music off';
  }else{
    audio.volume=0.45;
    audio.play().then(()=>{
      musicOn=true;
      btn.classList.add('on');
      btn.textContent='🔊 vibe playing';
    }).catch(()=>{ btn.textContent='⚠ couldn\'t play (check background.mp3)'; });
  }
}

/* ---------- build inputs ---------- */
function buildTeams(){
  const wrap=document.getElementById('teams');
  wrap.innerHTML='';
  ['A','B'].forEach(side=>{
    const t=TEAMS[side];
    const block=document.createElement('div');
    block.className='team-block '+side;
    block.innerHTML=`<div class="label">${t.emoji} Team ${t.name}</div>`;
    t.members.forEach(m=>{
      const c=document.createElement('div');
      c.className='card '+side;
      c.innerHTML=`
        <div class="chead">
          <span class="nm">${m.emoji} ${m.name}</span>
          <span class="total" id="tot-${m.id}">${fmt(memberTotal(m.id))}</span>
        </div>
        <div class="months">
          ${MONTHS.map((mo,i)=>`
            <div class="month">
              <label>${mo}</label>
              <input type="number" inputmode="numeric" placeholder="0" id="in-${m.id}-${i}"
                value="${data[m.id][i]||''}"
                onfocus="activeInput='${m.id}-${i}'"
                onblur="activeInput=null"
                oninput="edit('${m.id}',${i},this.value)">
            </div>`).join('')}
        </div>`;
      block.appendChild(c);
    });
    wrap.appendChild(block);
  });
}

// update field values from cloud without disturbing the one being typed in
function refreshInputs(){
  Object.keys(data).forEach(id=>{
    for(let i=0;i<3;i++){
      const el=document.getElementById('in-'+id+'-'+i);
      if(el && activeInput!==id+'-'+i){ el.value = data[id][i]||''; }
    }
    const tot=document.getElementById('tot-'+id);
    if(tot) tot.textContent=fmt(memberTotal(id));
  });
}

function edit(id,i,v){
  data[id][i]= v===''?0:Math.max(0,+v);
  document.getElementById('tot-'+id).textContent=fmt(memberTotal(id));
  render(); queueSave();
}

function playFirstSting(){
  const a=document.getElementById('firstSound'); if(!a) return;
  try{ a.currentTime=0; a.volume=0.8; a.play().catch(()=>{}); }catch(e){}
}

let flashSide=null;
function render(){
  const a=teamTotal('A'), b=teamTotal('B'), sum=a+b;
  document.getElementById('tug-a').style.width=(sum? a/sum*100:50)+'%';
  document.getElementById('tug-b').style.width=(sum? b/sum*100:50)+'%';

  let leader=null;
  if(sum>0 && a!==b) leader = a>b ? 'A':'B';

  if(leader && leader!==currentLeader){
    const firstEver = currentLeader===null;
    currentLeader=leader;
    if(!firstEver){ playFirstSting(); flashSide=leader; setTimeout(()=>{flashSide=null; buildArena(a,b,leader);},700); }
  }else if(!leader){ currentLeader=null; }

  buildArena(a,b,leader);
}

function buildArena(a,b,leader){
  const arena=document.getElementById('arena');
  const totals={A:a,B:b};
  arena.innerHTML='';
  const fA=fighter('A',totals,leader);
  const vs=document.createElement('div'); vs.className='vs'; vs.textContent='VS';
  const fB=fighter('B',totals,leader);
  arena.append(fA,vs,fB);
}

function fighter(side,totals,leader){
  const t=TEAMS[side];
  const isLead = leader===side;
  const sum=totals.A+totals.B;
  let tag;
  if(sum===0) tag=TIE_HYPE[1];
  else if(totals.A===totals.B) tag=TIE_HYPE[0];
  else tag = isLead ? LEAD_HYPE[totals[side]%LEAD_HYPE.length] : LOSE_HYPE[totals[side]%LOSE_HYPE.length];

  const d=document.createElement('div');
  d.className='fighter '+side+(isLead?' lead':'')+(flashSide===side?' justwon':'');
  d.innerHTML=`
    <div class="crown">${isLead?'👑':''}</div>
    <div class="fname">${t.emoji}<br>${t.name}</div>
    <div class="fcash">${fmt(totals[side])}</div>
    <div class="ftag">${tag}</div>`;
  return d;
}

buildTeams(); render();
cloudLoad();
setInterval(cloudLoad, 5000); // poll for others' updates every 5s
</script>
</body>
</html>
